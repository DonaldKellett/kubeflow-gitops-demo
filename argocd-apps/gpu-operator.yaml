---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gpu-operator
spec:
  project: default
  source:
    repoURL: https://github.com/DonaldKellett/kubeflow-gitops-demo.git
    path: components/gpu-operator/overlays/v1/
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
