---
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: pytorch-gpu-example
  namespace: kubeflow-user-example-com
spec:
  template:
    spec:
      containers:
        - name: pytorch-gpu-example
          image: ghcr.io/kubeflow/kubeflow/notebook-servers/jupyter-pytorch-cuda:v1.11.0
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "2"
              memory: 8Gi
              nvidia.com/gpu: "1"
          env:
            - name: NOTEBOOK_ARGS
              value: |-
                --ServerApp.port=8888
                --ServerApp.token=''
                --ServerApp.password=''
                --ServerApp.base_url=/notebook/kubeflow-user-example-com/pytorch-gpu-example
                --ServerApp.quit_button=False
          volumeMounts:
            - name: pytorch-gpu-example-volume
              mountPath: /home/jovyan
          readinessProbe:
            httpGet:
              path: /notebook/kubeflow-user-example-com/pytorch-gpu-example/api
              port: notebook-port
          livenessProbe:
            httpGet:
              path: /notebook/kubeflow-user-example-com/pytorch-gpu-example/api
              port: notebook-port
          ports:
            - containerPort: 8888
              name: notebook-port
      volumes:
        - name: pytorch-gpu-example-volume
          persistentVolumeClaim:
            claimName: pytorch-gpu-example-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pytorch-gpu-example-pvc
  namespace: kubeflow-user-example-com
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
